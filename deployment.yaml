apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperature-converter
  labels:
    app: temperature-converter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temperature-converter
  template:
    metadata:
      labels:
        app: temperature-converter
    spec:
      containers:
      - name: temperature-converter
        image: my-jboss-images/pr3012/temp-con:v3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        - containerPort: 8443
        env:
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m"
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: temperature-converter
spec:
  selector:
    app: temperature-converter
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: https
    port: 8443
    targetPort: 8443
  type: ClusterIP
