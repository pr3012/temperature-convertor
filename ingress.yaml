apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temperature-converter-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: temperature-converter.local
    http:
      paths:
      - path: /temperature-converter
        pathType: Prefix
        backend:
          service:
            name: temperature-converter
            port:
              number: 8080